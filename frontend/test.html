<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
  </head>

  <body>
    <h1>ICPC Room Test</h1>

    <div>
      <label>Room ID:</label>
      <input id="roomId" value="abc" />
    </div>

    <div>
      <label>Share Link:</label>
      <input id="shareLink" readonly style="width: 520px;" />
      <button id="copyShareLink">Copy</button>
    </div>

    <div>
      <label>User Name:</label>
      <input id="userName" placeholder="Alice / Bob" />
    </div>

    <hr />

    <button id="createRoom">Create Room</button>
    <button id="join">Join Room</button>
    <button id="leave">Leave Room</button>
    <button id="exportSnapshot">Export Snapshot</button>
    <button id="importSnapshot">Import Snapshot</button>
    <input
      id="snapshotFile"
      type="file"
      accept="application/json,.json"
      style="display: none;"
    />

    <hr />

    <button id="requestControl">Request Control</button>

    <h3>Control Requests</h3>
    <div id="controlRequests"></div>

    <hr />

    <h2>Shared Workspace</h2>
      <p id="controllerInfo">Current controller: none</p>
      <p id="editInfo">Editing status: not joined</p>

      <div style="display: flex; gap: 12px; align-items: stretch;">
        <aside
          style="
            width: 260px;
            border: 1px solid #ccc;
            padding: 8px;
            height: 500px;
            overflow: auto;
            font-family: monospace;
          "
        >
          <h3 style="margin-top: 0;">Workspace</h3>

          <div style="display: flex; gap: 4px; margin-bottom: 8px;">
            <button id="createFolder">New Folder</button>
            <button id="createFile">New File</button>
          </div>

          <div id="fileList"></div>
        </aside>

        <main style="flex: 1;">
          <div
            id="editor"
            style="width: 900px; height: 500px; border: 1px solid #ccc;"
          ></div>
        </main>
      </div>

    <hr />
    <hr />

    <h3>Console</h3>

    <div style="margin-bottom: 8px;">
      <button id="runCode">Run Code</button>

      <label style="margin-left: 12px;">
        Input mode:
        <select id="stdinMode">
          <option value="console">Console Input</option>
          <option value="file">File input.in</option>
        </select>
      </label>
    </div>

    <div style="display: flex; gap: 12px;">
      <div>
        <h4>Console Input</h4>
        <textarea
          id="consoleInput"
          style="width: 420px; height: 160px; font-family: monospace;"
          placeholder="Type stdin here, e.g.&#10;2 3"
        ></textarea>
      </div>

      <div>
        <h4>Console Output</h4>
        <pre
          id="consoleOutput"
          style="
            width: 520px;
            height: 160px;
            border: 1px solid #ccc;
            padding: 8px;
            overflow: auto;
            background: #111;
            color: #eee;
          "
        ></pre>
      </div>
    </div>

    <hr />

    <div style="display: flex; gap: 12px;">
      <section style="width: 520px;">
        <h3>Run History</h3>
        <div
          id="runHistory"
          style="
            height: 180px;
            border: 1px solid #ccc;
            padding: 8px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
          "
        ></div>
      </section>

      <section style="width: 520px;">
        <h3>Control Timeline</h3>
        <div
          id="controlTimeline"
          style="
            height: 180px;
            border: 1px solid #ccc;
            padding: 8px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
          "
        ></div>
      </section>
    </div>

    <pre id="log" style="display: none;"></pre>

    <!-- Set window.ICPC_BACKEND_URL here when frontend and backend use different hosts. -->
    <script src="./config.js"></script>
    <script src="./validation.js"></script>
    <script src="./shareLink.js"></script>
    <script src="./roomApi.js"></script>
    <script src="./render.js"></script>
    <script src="./roomController.js"></script>
    <script src="./controlView.js"></script>
    <script src="./editorSetup.js"></script>
    <script src="./workspaceTree.js"></script>
    <script src="./workspaceActions.js"></script>
    <script src="./wsClient.js"></script>
    <script src="./uiEvents.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
